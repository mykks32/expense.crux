# Publishes the release artifacts for expense.crux:
#   1. @mykks32/expense-crux-contracts -> GitHub Packages (npm registry)
#   2. apps/server Docker image         -> GitHub Container Registry (ghcr.io)
#   3. apps/web Docker image            -> GitHub Container Registry (ghcr.io)
#
# Trigger: push a version tag, e.g.
#   git tag v0.1.1 && git push origin v0.1.1
# or run manually from the Actions tab (workflow_dispatch), e.g. to rebuild
# an image after a CI-only fix without cutting a new contracts version.
#
# One-time repo setup required before this can succeed â€” see README.md's
# "Releasing" section:
#   - Settings -> Actions -> General -> Workflow permissions -> "Read and
#     write permissions" (the packages: write below is capped by this)
#   - first run only: link/set visibility on the published packages under
#     the repo's Packages tab
#
# The three jobs are independent and run in parallel: each Docker build
# compiles packages/contracts from source itself, so neither ever needs the
# npm package to have been published first.
name: Publish

on:
  push:
    tags:
      - 'v*.*.*' # e.g. v0.1.0, v1.2.3
  workflow_dispatch: {} # manual re-run from the Actions tab, no tag needed

jobs:
  # Builds and publishes the shared contracts package to GitHub Packages.
  # Requires packages/contracts/package.json's "version" to have been
  # bumped since the last publish â€” npm/GitHub Packages rejects re-publishing
  # an existing version.
  publish-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      # registry-url + scope make `pnpm publish` target GitHub Packages
      # instead of the public npm registry for the @mykks32 scope.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@mykks32'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @mykks32/expense-crux-contracts run build

      # --no-git-checks: CI checks out a detached tag ref, not a branch,
      # which pnpm would otherwise refuse to publish from.
      - run: pnpm publish --filter @mykks32/expense-crux-contracts --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Builds docker/server.Dockerfile's production stage and pushes it to
  # ghcr.io, tagged with both the semver version and `latest`.
  publish-server-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU + buildx let a single amd64 GitHub runner cross-build an
      # arm64 image too (needed for Apple Silicon `docker run` users) â€”
      # see platforms below.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives the image tags from the triggering ref, e.g. pushing tag
      # v0.1.1 produces both `ghcr.io/.../expense-crux-server:0.1.1` and
      # `:latest`.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/expense-crux-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # No `target:` needed â€” `production` is already the last stage in
      # the Dockerfile, which is what `docker build` uses by default.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Builds apps/web (TanStack Start) via docker/web.Dockerfile and pushes it to
  # ghcr.io, tagged with both the semver version and `latest`. VITE_API_URL is
  # inlined into the client bundle at build time (Vite's import.meta.env, not a
  # runtime env read) â€” set the repo variable VITE_API_URL (Settings -> Actions ->
  # Variables) to whatever URL browsers should reach the server at; defaults to
  # http://localhost:3000 if unset, which only works for `docker compose up` on
  # the same machine as the browser.
  publish-web-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/expense-crux-web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:3000' }}
