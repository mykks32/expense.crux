name: expense-crux

networks:
  expense-crux-net:
    driver: bridge

services:

  # Server API
  server:
    # Run locally (build from source):
    # cp ../env/server.env.example ../env/server.env (MONGO_URI host "mongo"), then `docker compose up --build`.
#    build:
#      context: ..
#      dockerfile: docker/server.Dockerfile
    # Run the published image instead: comment out `build:` above, uncomment `image:` below.
    # `docker login ghcr.io` first if private, then `docker compose up`.
    image: ghcr.io/mykks32/expense-crux-server:latest
    container_name: expense-crux-server
    networks:
      - expense-crux-net
    ports:
      - "3000:3000"
    env_file:
      - ../env/server.env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # Web app
  web:
    # Run locally (build from source):
    # cp ../env/web.env.example ../env/web.env, then `docker compose up --build`.
    # VITE_API_URL is baked into the client bundle at build time (Vite's
    # import.meta.env, not a runtime env read like the server) — it must be
    # reachable from the *browser*, not the compose network, so this stays
    # "localhost:3000" (server's host-mapped port above) rather than the
    # internal service name "server". SSR calls made from inside this
    # container itself use `environment.INTERNAL_API_URL` below instead —
    # see apps/web/src/lib/api.ts.
#    build:
#      context: ..
#      dockerfile: docker/web.Dockerfile
#      args:
#        VITE_API_URL: http://localhost:3000
    # Run the published image instead (this is the active mode below): comment
    # out `build:` above, uncomment `image:` below. `docker login ghcr.io`
    # first if private, then `docker compose up`.
    # env/web.env is NOT read in this mode — VITE_API_URL was already baked
    # into this image at publish time (see .github/workflows/publish.yml's
    # VITE_API_URL repo variable). Only env/server.env matters here.
    image: ghcr.io/mykks32/expense-crux-web:latest
    container_name: expense-crux-web
    networks:
      - expense-crux-net
    ports:
      - "3001:3001"
    environment:
      # Read at container runtime (process.env), not baked into the build like
      # VITE_API_URL above — used only for calls made from inside this
      # container itself (SSR), never by the browser. Must be the compose
      # service name, not "localhost": from inside the web container,
      # "localhost" is this container, not the separate server container, even
      # though they share the expense-crux-net network.
      INTERNAL_API_URL: http://server:3000
    depends_on:
      - server
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    container_name: expense-crux-mongo
    networks:
      - expense-crux-net
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: expense_crux
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
