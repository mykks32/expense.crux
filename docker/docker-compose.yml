name: expense-crux

networks:
  expense-crux-net:
    driver: bridge

services:

  # Backend API
  backend:
    # Run locally (build from source):
    # cp ../env/backend.env.example ../env/backend.env (MONGO_URI host "mongo"), then `docker compose up --build`.
#    build:
#      context: ..
#      dockerfile: apps/backend/Dockerfile
    # Run the published image instead: comment out `build:` above, uncomment `image:` below.
    # `docker login ghcr.io` first if private, then `docker compose up`.
    image: ghcr.io/mykks32/expense-crux-backend:latest
    container_name: expense-crux-backend
    networks:
      - expense-crux-net
    ports:
      - "3000:3000"
    env_file:
      - ../env/backend.env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    container_name: expense-crux-mongo
    networks:
      - expense-crux-net
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: expense_crux
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
